<!-- Página de acesso negado. -->
<main class="forbidden-page">
  <section class="forbidden-card">
    <div class="logo-mark" aria-hidden="true">A</div>
    <p class="eyebrow">Acesso negado</p>
    <h1>Você não tem permissão para acessar esta área.</h1>
    <p class="message">
      A tela de usuários é exclusiva para o perfil ADMIN. O perfil atual
      @if (sessao; as usuario) {
        é <strong>{{ usuario.perfil }}</strong>.
      } @else {
        não possui uma sessão ativa.
      }
    </p>
    <a routerLink="/login">Voltar para o login</a>
  </section>
</main>
